name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: go build / vet / lint / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: verify modules
        run: |
          go mod download
          go mod verify

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61.0
          args: --timeout=5m

      - name: go test
        run: go test -race -count=1 ./...

  web:
    name: web lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: htmlhint
        run: npx --yes htmlhint@1.1.4 "web/**/*.html"

      - name: prettier check
        run: npx --yes prettier@3.3.3 --check "web/**/*.{html,css,js}"
