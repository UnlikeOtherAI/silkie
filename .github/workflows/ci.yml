name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.1.6
          args: --timeout=5m

  build-test:
    name: build + test
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: selkie_test
          POSTGRES_USER: selkie
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U selkie -d selkie_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: verify modules
        run: |
          go mod download
          go mod verify

      - name: go build
        run: go build ./...

      - name: go test
        run: go test -race -count=1 ./...

  web:
    name: web lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: htmlhint
        run: npx --yes htmlhint@1.1.4 "web/**/*.html"

      - name: prettier check
        run: npx --yes prettier@3.3.3 --check "web/**/*.{html,css,js}"

      - name: admin-ui install
        working-directory: admin-ui
        run: pnpm install --frozen-lockfile

      - name: admin-ui typecheck
        working-directory: admin-ui
        run: pnpm lint

      - name: admin-ui build
        working-directory: admin-ui
        run: pnpm build

  e2e:
    name: e2e tests
    needs: [lint, build-test]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: install e2e deps
        working-directory: e2e
        run: pnpm install --frozen-lockfile

      - name: install playwright browsers
        working-directory: e2e
        run: pnpm exec playwright install --with-deps chromium

      - name: run e2e tests
        working-directory: e2e
        env:
          E2E_PG_URL: postgres://postgres:postgres@localhost:5432/postgres
          E2E_REDIS_URL: redis://localhost:6379
        run: pnpm test

      - name: upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

  # Placeholder — deploy job runs only on main after all checks pass.
  deploy:
    name: deploy (placeholder)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [lint, build-test, web, e2e]
    runs-on: ubuntu-latest
    steps:
      - run: echo "TODO — deploy to Google Cloud"
