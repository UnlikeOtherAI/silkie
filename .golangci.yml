# golangci-lint v2 configuration — strictest practical settings for selkie.

version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly
  allow-parallel-runners: true
  go: "1.23"

output:
  formats:
    text:
      path: stdout
      print-issued-lines: true
      print-linter-name: true
  sort-results: true

formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports

linters:
  enable:
    # correctness
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - contextcheck
    - errorlint
    - errname
    - exhaustive
    - gosec
    - nilerr
    - nilnesserr
    - noctx
    - rowserrcheck
    - sqlclosecheck
    - unconvert
    - fatcontext
    - nosprintfhostport
    - musttag

    # style / consistency
    - gocritic
    - goheader
    - misspell
    - nolintlint
    - predeclared
    - revive
    - tagliatelle
    - unparam
    - usestdlibvars
    - whitespace
    - dupword
    - godot
    - perfsprint
    - recvcheck
    - copyloopvar

    # complexity / dead code
    - dupl
    - gocognit
    - gocyclo
    - goconst
    - nakedret
    - prealloc
    - reassign
    - wastedassign
    - nestif

    # test quality
    - testifylint
    - thelper
    - tparallel
    - testpackage

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
      exclude-functions:
        - (io.Closer).Close
        - (net/http.ResponseWriter).Write

    govet:
      enable-all: true
      disable:
        - fieldalignment

    gocyclo:
      min-complexity: 15

    gocognit:
      min-complexity: 20

    dupl:
      threshold: 120

    goconst:
      min-len: 3
      min-occurrences: 3

    gosec:
      severity: low
      confidence: low
      excludes:
        - G104
        - G404

    revive:
      severity: warning
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: early-return
        - name: empty-block
        - name: empty-lines
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: exported
        - name: get-return
        - name: identical-branches
        - name: if-return
        - name: increment-decrement
        - name: indent-error-flow
        - name: modifies-value-receiver
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: string-of-int
        - name: superfluous-else
        - name: time-naming
        - name: unconditional-recursion
        - name: unexported-return
        - name: unnecessary-stmt
        - name: unreachable-code
        - name: unused-parameter
        - name: unused-receiver
        - name: var-declaration
        - name: var-naming
        - name: waitgroup-by-value

    staticcheck:
      checks: ["all"]

    tagliatelle:
      case:
        rules:
          json: snake
          yaml: snake
          xml: camel
          bson: camel

    nolintlint:
      allow-unused: false
      require-explanation: true
      require-specific: true

    exhaustive:
      default-signifies-exhaustive: true

    errorlint:
      errorf: true
      asserts: true
      comparison: true

    misspell:
      locale: US

    nestif:
      min-complexity: 6

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-use-default: false
  exclude-dirs:
    - vendor
    - docs
    - web
    - ops
    - migrations
  exclude-rules:
    - path: _test\.go
      linters:
        - dupl
        - gocognit
        - gocyclo
        - gosec
        - goconst
        - noctx
        - errcheck
    - path: cmd/.*/main\.go
      linters:
        - gocognit
        - gocyclo
